<html lang="ko">
<head>
<link rel="manifest" href="manifest.json">  
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">  
<meta charset="UTF-8">
<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
viewport-fit=cover
">

<title>SH Grip Pro</title>

<style>

:root {
    --bg: #050505;
    --card: #111;
    --line: #222;
    --text: #fff;
    --sub: #888;
    --main: #d9ff3f;
    --warm: #57a7ff;
    --negative: #ff8a3d;
    --hold: #b47cff;
    --green: #53ff8f;
    --red: #ff6666;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
color:var(--text);
}

button{
border:none;
outline:none;
cursor:pointer;
}

button:disabled {
opacity: 0.3;
cursor: not-allowed;
}

.hidden{
display:none!important;
}

.app{
height:100dvh;
display:flex;
flex-direction:column;
padding:
8px
12px
calc(12px + env(safe-area-inset-bottom));
overflow:hidden;
}

.topbar{
height:42px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
letter-spacing:2px;
flex-shrink:0;
}

.page{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:10px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
}

.label{
font-size:10px;
letter-spacing:2px;
color:var(--sub);
margin-bottom:8px;
}

.value{
font-size:32px;
font-weight:900;
}

.small{
font-size:20px;
}

.row{
display:flex;
gap:10px;
}

.row .card{
flex:1;
}

.main-btn{
width:100%;
height:72px;
border-radius:22px;
background:var(--main);
color:black;
font-size:20px;
font-weight:900;
flex-shrink:0;
}

.sub-btn{
width:100%;
height:56px;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:16px;
font-weight:900;
}

.session{
flex:1;
display:flex;
flex-direction:column;
justify-content:between;
overflow:hidden;
gap:10px;
}

.session-top{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
overflow-y:auto;
padding-bottom:10px;
}

.left-mode{
align-items:flex-start;
text-align:left;
}

.right-mode{
align-items:flex-end;
text-align:right;
}

.phase-badge{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
letter-spacing:1px;
}

.phase-warm{
background:rgba(87,167,255,.15);
color:var(--warm);
}

.phase-main{
background:rgba(217,255,63,.12);
color:var(--main);
}

.phase-negative{
background:rgba(255,138,61,.15);
color:var(--negative);
}

.phase-hold{
background:rgba(180,124,255,.15);
color:var(--hold);
}

.hand{
font-size:46px;
font-weight:900;
line-height:1;
}

.exercise{
font-size:24px;
font-weight:900;
line-height:1.1;
}

.progress-wrap{
width:100%;
display:flex;
flex-direction:column;
gap:6px;
}

.progress-info{
display:flex;
justify-content:space-between;
font-size:11px;
color:var(--sub);
}

.progress{
height:8px;
border-radius:999px;
background:#1a1a1a;
overflow:hidden;
}

.progress-fill{
height:100%;
background:var(--main);
width:0%;
transition:.25s;
}

.main-card{
width:100%;
background:#111;
border:1px solid #222;
border-radius:26px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.weight{
font-size:44px;
font-weight:900;
line-height:1;
}

.target{
font-size:16px;
font-weight:800;
}

.previous{
width:100%;
background:#0f0f0f;
border:1px solid #1d1d1d;
border-radius:16px;
padding:12px 14px;
display:flex;
flex-direction:column;
gap:6px;
}

.previous-label{
font-size:11px;
letter-spacing:2px;
color:#777;
}

.previous-value{
font-size:13px;
font-weight:900;
line-height:1.4;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.rep-wrap{
width:100%;
align-self:stretch;
}

.rep-grid{
width:100%;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
}

.rep-btn{
height:50px;
border-radius:14px;
background:#1a1a1a;
color:white;
font-size:18px;
font-weight:900;
}

.rep-btn.active{
background:var(--main);
color:black;
}

.setting-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.setting-btn{
height:54px;
border-radius:18px;
background:#1a1a1a;
color:white;
font-size:18px;
font-weight:900;
}

.setting-btn.active{
background:var(--main);
color:black;
}

.tabs{
height:60px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding-top:8px;
flex-shrink:0;
}

.tab{
border-radius:18px;
background:#111;
color:#777;
font-size:12px;
font-weight:900;
}

.tab.active{
background:var(--main);
color:black;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
z-index:99999;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.overlay-wrap{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.overlay-title{
font-size:18px;
font-weight:900;
letter-spacing:4px;
color:var(--main);
}

.overlay-time{
font-size:96px;
font-weight:900;
line-height:1;
}

/* 종료/건너뛰기 버튼 크기 및 가시성 대폭 확대 */
.overlay-btn{
width:100%;
height:80px;
border-radius:22px;
background:#222;
color:white;
font-size:22px;
font-weight:900;
border: 2px solid #444;
}

.result-page{
position:fixed;
inset:0;
background:#050505;
z-index:999999;
padding:24px;
overflow-y:auto;
}

.result-title{
font-size:34px;
font-weight:900;
margin-bottom:24px;
}

.result-section{
margin-bottom:24px;
padding:16px;
border-radius:20px;
}

.result-main{
background:rgba(217,255,63,.06);
border:1px solid rgba(217,255,63,.15);
}

.result-negative{
background:rgba(255,138,61,.06);
border:1px solid rgba(255,138,61,.15);
}

.result-hold{
background:rgba(180,124,255,.06);
border:1px solid rgba(180,124,255,.15);
}

.result-label{
font-size:12px;
letter-spacing:2px;
margin-bottom:6px;
font-weight:900;
}

.result-weight{
font-size:13px;
font-weight:900;
margin-bottom:10px;
opacity:.8;
}

.result-line{
font-size:15px;
font-weight:900;
margin-bottom:6px;
}

.history-card{
background:#111;
border:1px solid #222;
border-radius:22px;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.history-title{
font-size:12px;
letter-spacing:2px;
color:#888;
}

.history-block{
padding-left:12px;
border-left:4px solid;
}

.history-main{
border-color:var(--main);
}

.history-negative{
border-color:var(--negative);
}

.history-hold{
border-color:var(--hold);
}

.history-label{
font-size:11px;
font-weight:900;
margin-bottom:8px;
}

.history-line{
font-size:14px;
font-weight:800;
margin-bottom:4px;
}

.fail{
color:var(--red);
}

.action-wrap {
display:flex;
gap:10px;
width:100%;
flex-shrink:0;
}

.prev-step-btn {
width: 35%;
height: 72px;
border-radius: 22px;
background: #222;
color: #fff;
font-size: 16px;
font-weight: 900;
border: 1px solid #333;
}

.action-wrap .main-btn {
width: 65%;
}

/* 최근 메인 세트 디테일 라벨 색상 흰색 통일 */
#homeRecentDetail {
    font-size: 14px;
    font-weight: 700;
    margin-top: 6px;
    line-height: 1.6;
}
.home-rep-line {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 14px;
    font-weight: 700;
}
.home-rep-line:last-child {
    border-bottom: none;
}
.home-rep-label {
    color: var(--text);
}
.home-rep-value {
    color: var(--text);
}

</style>
</head>

<script>

const weights=[25,36,47,58,69,80];
const lbs=[55,79,104,128,152,176];

let userData=
JSON.parse(
localStorage.getItem('gdiron_v501')
)
||
{
 mainIndex:1,
 bestHoldLeft:0,
 bestHoldRight:0,
 history:[]
}

function saveData(){

localStorage.setItem(
'gdiron_v501',
JSON.stringify(userData)
);

}

function updateBestHold(){

if(userData.history.length) {
    const recent = userData.history[0];
    document.getElementById('bestLeftHold').textContent = `${parseFloat(recent.holdLeft || 0).toFixed(1)}s`;
    document.getElementById('bestRightHold').textContent = `${parseFloat(recent.holdRight || 0).toFixed(1)}s`;
    document.getElementById('lblLeftHold').textContent = "L HOLD (최근 기록)";
    document.getElementById('lblRightHold').textContent = "R HOLD (최근 기록)";
} else {
    document.getElementById('bestLeftHold').textContent = `0.0s`;
    document.getElementById('bestRightHold').textContent = `0.0s`;
    document.getElementById('lblLeftHold').textContent = "L HOLD (최근 기록)";
    document.getElementById('lblRightHold').textContent = "R HOLD (최근 기록)";
}

}

function updateHomeUI(){

const currentKg = weights[userData.mainIndex-1];
const currentLb = lbs[userData.mainIndex-1];
document.getElementById('homeWeight').textContent = `${currentKg}kg (${currentLb}lb)`;

const nextIdx = Math.min(5, userData.mainIndex);
document.getElementById('nextWeight').textContent = `${weights[nextIdx]}kg (${lbs[nextIdx]}lb)`;

if(userData.history.length){

    const recent = userData.history[0];
    
    document.getElementById('recentResult').textContent = recent.date;
    
    const recentWeightIdx = weights.indexOf(recent.mainWeight);
    const recentLb = recentWeightIdx !== -1 ? lbs[recentWeightIdx] : '';
    document.getElementById('homeRecentWeight').textContent = recentLb ? `${recent.mainWeight}kg (${recentLb}lb)` : `${recent.mainWeight}kg`;
    
    const detailHtml = recent.mainResults.map(r => {
        const rightText = r.right !== null ? `R${r.right}` : 'R -';
        return `<div class="home-rep-line">
                    <span class="home-rep-label">${r.set}세트</span>
                    <span class="home-rep-value">L${r.left} / ${rightText}</span>
                </div>`;
    }).join('');
    
    document.getElementById('homeRecentDetail').innerHTML = detailHtml;

}else{

    document.getElementById('recentResult').textContent = '없음';
    document.getElementById('homeRecentWeight').textContent = '0kg';
    document.getElementById('homeRecentDetail').textContent = '훈련 데이터가 없습니다.';

}

updateBestHold();

}

let flow=[];
let flowIndex=0;

let currentHand='LEFT';

let selectedRep=10;

let mainResults=[];
let negativeResults=[];

let holdLeft=0;
let holdRight=0;

function buildFlow(){

    const main=userData.mainIndex;

    flow=[];

    // 웜업 1: 메인 - 2단계 (최소 1단계 즉, 0번 인덱스)
    flow.push({
        type:'warmup',
        title:'웜업 1',
        target:15,
        weight:weights[Math.max(0, main - 3)]
    });

    // 웜업 2: 메인 - 1단계 (최소 1단계 즉, 0번 인덱스)
    flow.push({
        type:'warmup',
        title:'웜업 2',
        target:8,
        weight:weights[Math.max(0, main - 2)]
    });

    // 메인 3세트
    for(let i=1;i<=3;i++){
        flow.push({
            type:'main',
            title:`메인 ${i}세트`,
            set:i,
            target:8,
            weight:weights[main-1]
        });
    }

    // 네거티브: 메인 + 1단계 (최대 6단계 즉, 5번 인덱스), 총 2회 수행을 위해 2개 세트로 분할 추가
    for(let i=1;i<=2;i++){
        flow.push({
            type:'negative',
            title:`네거티브 ${i}회차`,
            set:i,
            target:5,
            weight:weights[Math.min(5, main)]
        });
    }

    // 홀딩: 메인무게 동일, 20초 설정, 총 2회 수행을 위해 2개 세트로 분할 추가
    for(let i=1;i<=2;i++){
        flow.push({
            type:'hold',
            title:`최대 홀딩 ${i}회차`,
            set:i,
            target:20,
            weight:weights[main-1]
        });
    }

}

function openPage(page){

    document.querySelectorAll('.page,.session').forEach(p=>{
        p.classList.add('hidden');
    });

    const tabsMenu = document.querySelector('.tabs');

    if(page==='home'){
        homePage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }

    if(page==='session'){
        sessionPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }

    if(page==='history'){
        historyPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }

    if(page==='setting'){
        settingPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }
}

function getPrevRecord(type,setNum){

if(!userData.history.length)
return '없음';

const last=
userData.history[0];

if(type==='main'){

const item=
last.mainResults.find(
r=>r.set===setNum
);

if(!item)
return '없음';

return `${last.mainWeight}kg | L${item.left} / R${item.right}`;

}

if(type==='negative'){
    // 최신 기록의 네거티브 배열에서 현재 세트(회차) 번호와 일치하는 데이터 탐색
    const left = last.negativeResults.filter(n => n.hand === 'LEFT')[setNum - 1];
    const right = last.negativeResults.filter(n => n.hand === 'RIGHT')[setNum - 1];
    return `${last.negativeWeight}kg | L${left?.value || 0}s / R${right?.value || 0}s`;
}

if(type==='hold'){
    // 데이터 구조 유지를 위해, 홀딩 기록도 유연하게 현재 세트 매칭 혹은 전체 배열 순서 매칭 처리
    // 기존 요약 데이터(holdLeft/Right) 대신 배열이 보관된다면 베스트지만, 기존 구조 호환을 위해 세트별 분할 매칭 처리 유도 가능
    // 만약 기존 result 저장 방식이 단일값 형태라면 아래와 같이 단순 유지하거나, 히스토리 기반 필터링 수행
    const left = last.holdResults ? last.holdResults.filter(h => h.hand === 'LEFT')[setNum - 1]?.value : last.holdLeft;
    const right = last.holdResults ? last.holdResults.filter(h => h.hand === 'RIGHT')[setNum - 1]?.value : last.holdRight;
    return `${last.holdWeight}kg | L${left || 0}s / R${right || 0}s`;
}

return '없음';

}

function renderStep(){

const item=flow[flowIndex];

const top=
document.getElementById(
'sessionTop'
);

top.classList.remove(
'left-mode',
'right-mode'
);

top.classList.add(
currentHand==='LEFT'
?
'left-mode'
:
'right-mode'
);

const badge=
document.getElementById(
'phaseBadge'
);

badge.className='phase-badge';

if(item.type==='warmup'){
badge.classList.add('phase-warm');
badge.textContent='WARMUP';
}

if(item.type==='main'){
badge.classList.add('phase-main');
badge.textContent='MAIN';
}

if(item.type==='negative'){
badge.classList.add('phase-negative');
badge.textContent='NEGATIVE';
}

if(item.type==='hold'){
badge.classList.add('phase-hold');
badge.textContent='HOLD';
}

document.getElementById(
'handText'
).textContent=currentHand;

document.getElementById(
'exerciseText'
).textContent=item.title;

const weightIdx = weights.indexOf(item.weight);
const displayLb = weightIdx !== -1 ? lbs[weightIdx] : '';
document.getElementById('weightText').textContent = displayLb ? `${item.weight}kg (${displayLb}lb)` : `${item.weight}kg`;

document.getElementById(
'targetText'
).textContent=

item.type==='negative'
?
'5초 유지'

:
item.type==='hold'
?
`${item.target || 20}초 유지`

:
`${item.target || 8}회 수행`;

document.getElementById(
'progressText'
).textContent=
`${flowIndex+1}/${flow.length}`;

document.getElementById(
'progressFill'
).style.width=
`${((flowIndex+1)/flow.length)*100}%`;

document.getElementById(
'prevRecord'
).textContent=
getPrevRecord(
item.type,
item.set
);

document.getElementById(
'repSection'
).style.display=
item.type==='main'
?
'block'
:
'none';

// 수정사항 1: 네거티브 운동일 때 완료 버튼의 텍스트를 '시작'으로 변경
const actionBtn = document.getElementById('actionBtn');
if (item.type === 'negative') {
    actionBtn.textContent = '시작';
} else if (item.type === 'hold') {
    actionBtn.textContent = '시작';
} else {
    actionBtn.textContent = '완료';
}

const prevBtn = document.getElementById('prevStepBtn');
if (flowIndex === 0 && currentHand === 'LEFT') {
    prevBtn.disabled = true;
} else {
    prevBtn.disabled = false;
}

}

document
.querySelectorAll('.rep-btn')
.forEach(btn=>{

btn.onclick=()=>{

document
.querySelectorAll('.rep-btn')
.forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

selectedRep=
Number(btn.textContent);

};

});

document.getElementById(
'startBtn'
).onclick=()=>{

buildFlow();

flowIndex=0;

currentHand='LEFT';

mainResults=[];
negativeResults=[];

holdLeft=0;
holdRight=0;

openPage('session');

renderStep();

};

const overlay=
document.getElementById(
'overlay'
);

let timer;

function playBeep(frequency, duration) {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
        
        oscillator.start();
        setTimeout(() => {
            oscillator.stop();
            audioCtx.close();
        }, duration);
    } catch (e) {
        console.log("AudioContext 차단 우회");
    }
}

function triggerRestEndNotification() {
    if (navigator.vibrate) {
        navigator.vibrate(500);
    }
    playBeep(440, 400);
}

// 수정사항 3-1: 네거티브 5초 타임오버 완료 알림용 트리거 함수 구현
function triggerNegativeEndNotification() {
    if (navigator.vibrate) {
        navigator.vibrate(600); // 0.6초 강한 진동
    }
    playBeep(587.33, 450); // 고주파 완료 비프음
}

function startRest(){

overlay.classList.remove('hidden');

document.getElementById(
'overlayTitle'
).textContent='REST';

document.getElementById(
'overlayBtn'
).textContent='건너뛰기';

let sec=120;

updateRest(sec);

clearInterval(timer);

timer=setInterval(()=>{

sec--;

updateRest(sec);

if(sec === 3 || sec === 2 || sec === 1) {
    playBeep(880, 80);
}

if(sec<=0){

clearInterval(timer);

overlay.classList.add('hidden');

triggerRestEndNotification();

nextStep();

}

},1000);

document.getElementById(
'overlayBtn'
).onclick=(e)=>{
e.stopPropagation();
clearInterval(timer);
overlay.classList.add('hidden');
nextStep();
};

}

function updateRest(sec){

const m=
String(Math.floor(sec/60))
.padStart(2,'0');

const s=
String(sec%60)
.padStart(2,'0');

document.getElementById(
'overlayTime'
).textContent=
`${m}:${s}`;

}

function startNegative(){

overlay.classList.remove('hidden');

document.getElementById(
'overlayTitle'
).textContent='NEGATIVE';

document.getElementById(
'overlayBtn'
).textContent='종료';

const start=Date.now();

clearInterval(timer);

timer=setInterval(()=>{

const sec=
5-
((Date.now()-start)/1000);

document.getElementById(
'overlayTime'
).textContent=
Math.max(0,sec).toFixed(1);

if(sec<=0){

clearInterval(timer);

// 수정사항 3-2: 5초 정상 완료 시 소리 및 진동 알림 호출
triggerNegativeEndNotification();

finishNegative(5);

}

},100);

document.getElementById(
'overlayBtn'
).onclick=(e)=>{
e.stopPropagation();
clearInterval(timer);
const sec=
((Date.now()-start)/1000);
finishNegative(sec);
};

}

function finishNegative(sec){

negativeResults.push({
hand:currentHand,
value:sec.toFixed(1)
});

overlay.classList.add('hidden');

if(currentHand==='LEFT'){

currentHand='RIGHT';

renderStep();

return;

}

startRest();

}

function startHold(){

overlay.classList.remove('hidden');

document.getElementById(
'overlayTitle'
).textContent='HOLD';

document.getElementById(
'overlayBtn'
).textContent='종료';

const start=Date.now();

clearInterval(timer);

timer=setInterval(()=>{

const sec=
((Date.now()-start)/1000);

document.getElementById(
'overlayTime'
).textContent=
sec.toFixed(1);

},100);

document.getElementById(
'overlayBtn'
).onclick=(e)=>{
e.stopPropagation();
clearInterval(timer);
const sec=
((Date.now()-start)/1000);
finishHold(sec);
};

}

    // 상단 전역 변수 선언부(let holdLeft=0; 등)가 있는 곳 근처에 아래 변수를 추가하거나 함수 내에서 배열로 관리
    // 여기서는 기존 데이터를 배열로 누적하도록 수정합니다.
    function finishHold(sec){

        overlay.classList.add('hidden');

        // 전역 변수 구조에 맞춰 holdResults 배열이 없다면 초기화 (startBtn 클릭 시 초기화 권장)
        if (!window.holdResults) window.holdResults = [];

        if(currentHand==='LEFT'){
            window.holdResults.push({
                set: flow[flowIndex].set,
                left: sec.toFixed(1),
                right: null
            });

            currentHand='RIGHT';
            renderStep();
            return;
        }

        window.holdResults[window.holdResults.length - 1].right = sec.toFixed(1);

        // 홀딩이 2회차까지 있으므로, 마지막 세트가 아니면 휴식으로 보냄
        if (flowIndex < flow.length - 1) {
            startRest();
        } else {
            finishSession();
        }
    }

function nextStep(){

flowIndex++;

currentHand='LEFT';

if(flowIndex>=flow.length){

finishSession();
return;

}

renderStep();

}

document.getElementById(
'actionBtn'
).onclick=()=>{

const item=flow[flowIndex];

if(item.type==='negative'){
startNegative();
return;
}

if(item.type==='hold'){
startHold();
return;
}

if(item.type==='main'){

if(currentHand==='LEFT'){

mainResults.push({
set:item.set,
left:selectedRep,
right:null
});

currentHand='RIGHT';

renderStep();

return;

}

mainResults[
mainResults.length-1
].right=selectedRep;

startRest();

return;

}

if(currentHand==='LEFT'){

currentHand='RIGHT';

renderStep();

return;

}

startRest();

};

document.getElementById('prevStepBtn').onclick = () => {
    if (flowIndex === 0 && currentHand === 'LEFT') return;

    const currentItem = flow[flowIndex];

    if (currentHand === 'RIGHT') {
        currentHand = 'LEFT';
        if (currentItem.type === 'main') {
            mainResults.pop();
        } else if (currentItem.type === 'negative') {
            negativeResults.pop();
        } else if (currentItem.type === 'hold') {
            holdLeft = 0;
        }
    } else {
        flowIndex--;
        currentHand = 'RIGHT';
        
        const prevItem = flow[flowIndex];
        if (prevItem.type === 'main') {
            if(mainResults.length > 0) {
                const lastMain = mainResults[mainResults.length - 1];
                selectedRep = lastMain.left; 
                lastMain.right = null;
                
                document.querySelectorAll('.rep-btn').forEach(b => {
                    b.classList.remove('active');
                    if(Number(b.textContent) === selectedRep) b.classList.add('active');
                });
            }
        } else if (prevItem.type === 'negative') {
            negativeResults.pop();
        }
    }
    
    renderStep();
};

document.getElementById('overlay').onclick = function() {
    const btnElement = document.getElementById('overlayBtn');
    if (btnElement) {
        btnElement.click();
    }
};

document.querySelector('.overlay-wrap').onclick = function(e) {
    e.stopPropagation();
};

function finishSession(){

userData.bestHoldLeft=
Math.max(
userData.bestHoldLeft||0,
holdLeft
);

userData.bestHoldRight=
Math.max(
userData.bestHoldRight||0,
holdRight
);
const success=
mainResults.every(
r=>r.left>=8 && r.right>=8
);

const currentMainWeight=
weights[userData.mainIndex-1];

const currentNegativeWeight=
weights[
Math.min(5,userData.mainIndex)
];

if(success && userData.mainIndex<6){
userData.mainIndex++;
}

    userData.history.unshift({

    date:
    new Date()
    .toLocaleDateString(),

    mainWeight:
    currentMainWeight,

    negativeWeight:
    currentNegativeWeight,

    holdWeight:
    currentMainWeight,

    mainResults,

    negativeResults,

    // 단일 값 대신에 세트별 배열 전체를 저장하도록 변경
    holdResults: window.holdResults || []

    });

saveData();

updateHomeUI();

renderResult();

}

function renderResult(){

document.getElementById(
'resultPage'
).classList.remove('hidden');

const history=
userData.history[0];

document.getElementById(
'resultMain'
).innerHTML=

`
<div
class="result-label"
style="color:var(--main);"
>
메인 운동
</div>

<div class="result-weight">
${history.mainWeight}kg
</div>

${history.mainResults.map(r=>`

<div
class="result-line"
style="color:var(--main);"
>
${r.set}세트
L${r.left}
/
R${r.right}
</div>

`).join('')}
`;

document.getElementById(
'resultNegative'
).innerHTML=

`
<div
class="result-label"
style="color:var(--negative);"
>
네거티브
</div>

<div class="result-weight">
${history.negativeWeight}kg
</div>

${history.negativeResults.map(n=>`

<div
class="result-line"
style="color:var(--negative);"
>
${n.hand}
${n.value}초
</div>

`).join('')}
`;

document.getElementById(
'resultHold'
).innerHTML=

`
<div
class="result-label"
style="color:var(--hold);"
>
홀딩
</div>

<div class="result-weight">
${history.holdWeight}kg
</div>

    // 결과창과 히스토리 창 모두 아래처럼 배열 매핑 방식으로 변경해 줍니다.
    ${(history.holdResults || []).map(h => `
    <div class="result-line" style="color:var(--hold);">
    ${h.set}회차 L${h.left}초 / R${h.right}초
    </div>
    `).join('')}

`;

loadHistory();

}

document.getElementById('resultCloseBtn').onclick=()=>{

    document.getElementById('resultPage').classList.add('hidden');
    
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        if(t.dataset.page === 'home') t.classList.add('active');
    });

    openPage('home');
};

function loadHistory(){

const page=
document.getElementById(
'historyPage'
);

page.innerHTML='';

userData.history.forEach(item=>{

const div=
document.createElement('div');

div.className='history-card';

div.innerHTML=`

<div class="history-title">
${item.date}
</div>

<div
class="
history-block
history-main
"
>

<div
class="history-label"
style="color:var(--main);"
>
MAIN
${item.mainWeight}kg
</div>

${item.mainResults.map(r=>`

<div
class="
history-line
${(
r.left<8
||
r.right<8
)
?
'fail'
:
''
}
"
>

${r.set}세트
L${r.left}
/
R${r.right}

</div>

`).join('')}

</div>

<div
class="
history-block
history-negative
"
>

<div
class="history-label"
style="color:var(--negative);"
>
NEGATIVE
${item.negativeWeight}kg
</div>

${item.negativeResults.map(n=>`

<div class="history-line">

</div>

<div
class="
history-block
history-hold
"
>

<div

>
HOLD
${item.holdWeight}kg
</div>

<div class="history-line">
LEFT

</div>

${item.holdRight}초
</div>

page.appendChild(div);

}

document
.querySelectorAll('.setting-btn')
.forEach((btn,index)=>{

if(userData.mainIndex===index+1){
btn.classList.add('active');
}

btn.onclick=()=>{

document
.querySelectorAll('.setting-btn')
.forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

userData.mainIndex=index+1;

saveData();

updateHomeUI();

};

});

document
.querySelectorAll('.tab')
.forEach(tab=>{

tab.onclick=()=>{

document
.querySelectorAll('.tab')
.forEach(t=>{
t.classList.remove('active');
});

tab.classList.add('active');

openPage(tab.dataset.page);

};

});

document.getElementById(
'resetBtn'
).onclick=()=>{

document.getElementById(
'resetOverlay'
).classList.remove('hidden');

};

document.getElementById(
'cancelResetBtn'
).onclick=()=>{

document.getElementById(
'resetOverlay'
).classList.add('hidden');

};

document.getElementById(
'confirmResetBtn'
).onclick=()=>{

localStorage.removeItem(
'gdiron_v501'
);

userData={
mainIndex:1,
history:[]
};

saveData();

updateHomeUI();

loadHistory();

document.getElementById(
'resetOverlay'
).classList.add('hidden');

openPage('home');

};

updateHomeUI();

loadHistory();

</script>
