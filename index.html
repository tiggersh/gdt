<html lang="ko">
<head>
<link rel="manifest" href="manifest.json">  
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>SH Grip Pro</title>

<style>
:root {
    --bg: #050505;
    --card: #111;
    --line: #222;
    --text: #fff;
    --sub: #888;
    --main: #d9ff3f;
    --warm: #57a7ff;
    --negative: #ff8a3d;
    --hold: #b47cff;
    --green: #53ff8f;
    --red: #ff6666;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html, body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
color:var(--text);
}

button{
border:none;
outline:none;
cursor:pointer;
}

button:disabled {
opacity: 0.3;
cursor: not-allowed;
}

.hidden{
display:none!important;
}

.app{
height:100dvh;
display:flex;
flex-direction:column;
padding: 8px 12px calc(12px + env(safe-area-inset-bottom));
overflow:hidden;
}

.topbar{
height:42px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
letter-spacing:2px;
flex-shrink:0;
}

.page{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:10px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
padding:16px;
}

.label{
font-size:10px;
letter-spacing:2px;
color:var(--sub);
margin-bottom:8px;
}

.value{
font-size:32px;
font-weight:900;
}

.small{
font-size:18px;
}

.row{
display:flex;
gap:10px;
}

.row .card{
flex:1;
}

.main-btn{
width:100%;
height:72px;
border-radius:22px;
background:var(--main);
color:black;
font-size:20px;
font-weight:900;
flex-shrink:0;
}

.sub-btn{
width:100%;
height:56px;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:16px;
font-weight:900;
}

.session{
flex:1;
display:flex;
flex-direction:column;
justify-content:between;
overflow:hidden;
gap:10px;
}

.session-top{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
overflow-y:auto;
padding-bottom:10px;
}

.left-mode{
align-items:flex-start;
text-align:left;
}

.right-mode{
align-items:flex-end;
text-align:right;
}

.phase-badge{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
letter-spacing:1px;
}

.phase-warm{
background:rgba(87,167,255,.15);
color:var(--warm);
}

.phase-main{
background:rgba(217,255,63,.12);
color:var(--main);
}

.phase-negative{
background:rgba(255,138,61,.15);
color:var(--negative);
}

.phase-hold{
background:rgba(180,124,255,.15);
color:var(--hold);
}

.hand{
font-size:46px;
font-weight:900;
line-height:1;
}

.exercise{
font-size:24px;
font-weight:900;
line-height:1.1;
}

.progress-wrap{
width:100%;
display:flex;
flex-direction:column;
gap:6px;
}

.progress-info{
display:flex;
justify-content:space-between;
font-size:11px;
color:var(--sub);
}

.progress{
height:8px;
border-radius:999px;
background:#1a1a1a;
overflow:hidden;
}

.progress-fill{
height:100%;
background:var(--main);
width:0%;
transition:.25s;
}

.main-card{
width:100%;
background:#111;
border:1px solid #222;
border-radius:26px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.weight{
font-size:44px;
font-weight:900;
line-height:1;
}

.target{
font-size:16px;
font-weight:800;
}

.previous{
width:100%;
background:#0f0f0f;
border:1px solid #1d1d1d;
border-radius:16px;
padding:12px 14px;
display:flex;
flex-direction:column;
gap:6px;
}

.previous-label{
font-size:11px;
letter-spacing:2px;
color:#777;
}

.previous-value{
font-size:13px;
font-weight:900;
line-height:1.4;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.rep-wrap{
width:100%;
align-self:stretch;
}

.rep-grid{
width:100%;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
}

.rep-btn{
height:50px;
border-radius:14px;
background:#1a1a1a;
color:white;
font-size:18px;
font-weight:900;
}

.rep-btn.active{
background:var(--main);
color:black;
}

.setting-toggle-tabs {
display: flex;
gap: 8px;
margin-bottom: 12px;
}

.toggle-btn {
flex: 1;
height: 44px;
border-radius: 14px;
background: #1a1a1a;
color: var(--sub);
font-size: 14px;
font-weight: 900;
border: 1px solid #222;
}

.toggle-btn.active {
background: #222;
color: #fff;
border-color: #444;
}

.setting-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.setting-btn{
height:54px;
border-radius:18px;
background:#1a1a1a;
color:white;
font-size:18px;
font-weight:900;
}

.setting-btn.active{
background:var(--main);
color:black;
}

.tabs{
height:60px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding-top:8px;
flex-shrink:0;
}

.tab{
border-radius:18px;
background:#111;
color:#777;
font-size:12px;
font-weight:900;
}

.tab.active{
background:var(--main);
color:black;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
z-index:99999;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.overlay-wrap{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.overlay-title{
font-size:18px;
font-weight:900;
letter-spacing:4px;
color:var(--main);
}

.overlay-time{
font-size:96px;
font-weight:900;
line-height:1;
}

.overlay-btn{
width:100%;
height:80px;
border-radius:22px;
background:#222;
color:white;
font-size:22px;
font-weight:900;
border: 2px solid #444;
}

.result-page{
position:fixed;
inset:0;
background:#050505;
z-index:999999;
padding:24px;
overflow-y:auto;
}

.result-title{
font-size:34px;
font-weight:900;
margin-bottom:24px;
}

.result-section{
margin-bottom:24px;
padding:16px;
border-radius:20px;
}

.result-main{
background:rgba(217,255,63,.06);
border:1px solid rgba(217,255,63,.15);
}

.result-negative{
background:rgba(255,138,61,.06);
border:1px solid rgba(255,138,61,.15);
}

.result-hold{
background:rgba(180,124,255,.06);
border:1px solid rgba(180,124,255,.15);
}

.result-label{
font-size:12px;
letter-spacing:2px;
margin-bottom:6px;
font-weight:900;
}

.result-weight{
font-size:13px;
font-weight:900;
margin-bottom:10px;
opacity:.8;
}

.result-line{
font-size:15px;
font-weight:900;
margin-bottom:6px;
}

.history-card{
background:#111;
border:1px solid #222;
border-radius:22px;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.history-title{
font-size:12px;
letter-spacing:2px;
color:#888;
}

.history-block{
padding-left:12px;
border-left:4px solid;
}

.history-main{
border-color:var(--main);
}

.history-negative{
border-color:var(--negative);
}

.history-hold{
border-color:var(--hold);
}

.history-label{
font-size:11px;
font-weight:900;
margin-bottom:8px;
}

.history-line{
font-size:14px;
font-weight:800;
margin-bottom:4px;
}

.fail{
color:var(--red);
}

.action-wrap {
display:flex;
gap:10px;
width:100%;
flex-shrink:0;
}

.prev-step-btn {
width: 35%;
height: 72px;
border-radius: 22px;
background: #222;
color: #fff;
font-size: 16px;
font-weight: 900;
border: 1px solid #333;
}

.action-wrap .main-btn {
width: 65%;
}

/* 홈 개편 대시보드 커스텀 스타일 */
.streak-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.streak-row {
    background: #161616;
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.streak-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.streak-hand-title {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
}
.streak-hand-title.left { color: var(--main); }
.streak-hand-title.right { color: var(--warm); }

.streak-dots {
    display: flex;
    gap: 6px;
}
.dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #2a2a2a;
    display: inline-block;
}
.dot.success-active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
}
.dot.fail-active {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
}
.streak-msg {
    font-size: 11px;
    color: var(--sub);
    font-weight: 700;
}
.home-rep-line {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 14px;
    font-weight: 700;
}
#homeRecentDetail {
    font-size: 14px;
    font-weight: 700;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
SH Grip Pro
</div>

<div class="page" id="homePage">

<div class="card" style="background: linear-gradient(145deg, #111, #1a1a1a); border-color: #333;">
<div class="label" style="text-align: center;">🔥 오늘 도전 무게 (CURRENT WEIGHT)</div>
<div class="value" id="homeWeight" style="font-size: 34px; text-align: center; color: var(--main); margin: 6px 0;">L: 25kg / R: 25kg</div>
</div>

<div class="card">
<div class="label">🎯 연속 성공 / 실패 기록 상태</div>
<div class="streak-box">
    <div class="streak-row">
        <div class="streak-header">
            <span class="streak-hand-title left">LEFT HAND</span>
            <div class="streak-dots" id="leftDots">
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
        <div class="streak-msg" id="leftStreakMsg">연속 기록 분석 중...</div>
    </div>
    <div class="streak-row">
        <div class="streak-header">
            <span class="streak-hand-title right">RIGHT HAND</span>
            <div class="streak-dots" id="rightDots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
        <div class="streak-msg" id="rightStreakMsg">연속 기록 분석 중...</div>
    </div>
</div>
</div>

<div class="card">
    <div class="label">📋 최근 메인 세트 기록 요약 (<span id="homeRecentWeight" style="color: var(--sub);">0kg</span>)</div>
    <div id="homeRecentDetail">훈련 데이터가 없습니다.</div>
</div>

<button class="main-btn" id="startBtn">훈련 시작</button>

</div>

<div class="session hidden" id="sessionPage">

<div class="session-top left-mode" id="sessionTop">

<div class="phase-badge" id="phaseBadge">MAIN</div>
<div class="hand" id="handText">LEFT</div>
<div class="exercise" id="exerciseText">메인 1세트</div>
<div class="desc" id="descText">치팅 없이 순수 클로징</div>

<div class="progress-wrap">
<div class="progress-info">
<div id="progressText">1 / 7</div>
<div id="statusText">LEFT 진행</div>
</div>
<div class="progress">
<div class="progress-fill" id="progressFill"></div>
</div>
</div>

<div class="main-card">
<div class="weight" id="weightText">25kg</div>
<div class="target" id="targetText">10회 수행</div>
</div>

<div class="previous">
<div class="previous-label">PREV</div>
<div class="previous-value" id="prevRecord">없음</div>
</div>

<div class="rep-wrap" id="repSection">
<div class="rep-grid">
<button class="rep-btn">3</button>
<button class="rep-btn">4</button>
<button class="rep-btn">5</button>
<button class="rep-btn">6</button>
<button class="rep-btn">7</button>
<button class="rep-btn active">8</button>
</div>
</div>

</div>

<div class="action-wrap">
<button class="prev-step-btn" id="prevStepBtn">이전 단계</button>
<button class="main-btn" id="actionBtn">완료</button>
</div>

</div>

<div class="page hidden" id="historyPage"></div>

<div class="page hidden" id="settingPage">

<div class="card">
<div class="label">손 선택</div>
<div class="setting-toggle-tabs">
    <button class="toggle-btn active" id="toggleLeftBtn">왼손 (LEFT)</button>
    <button class="toggle-btn" id="toggleRightBtn">오른손 (RIGHT)</button>
</div>

<div class="label" id="settingWeightLabel">왼손 무게 설정</div>
<div class="setting-grid">
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">25kg<br><span style="font-size:10px; opacity:0.6;">55lb</span></button>
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">36kg<br><span style="font-size:10px; opacity:0.6;">79lb</span></button>
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">47kg<br><span style="font-size:10px; opacity:0.6;">104lb</span></button>
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">58kg<br><span style="font-size:10px; opacity:0.6;">128lb</span></button>
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">69kg<br><span style="font-size:10px; opacity:0.6;">152lb</span></button>
<button class="setting-btn" style="font-size: 13px; line-height: 1.2;">80kg<br><span style="font-size:10px; opacity:0.6;">176lb</span></button>
</div>
</div>

<button class="sub-btn" id="resetBtn">데이터 초기화</button>

</div>

<div class="tabs">
<button class="tab active" data-page="home">홈</button>
<button class="tab" data-page="session">훈련</button>
<button class="tab" data-page="history">기록</button>
<button class="tab" data-page="setting">설정</button>
</div>

</div>

<div class="result-page hidden" id="resultPage">
<div class="result-title">훈련 완료</div>
<div class="result-section result-main" id="resultMain"></div>
<div class="result-section result-negative" id="resultNegative"></div>
<div class="result-section result-hold" id="resultHold"></div>
<button class="main-btn" id="resultCloseBtn">홈으로</button>
</div>

<div class="overlay hidden" id="overlay">
<div class="overlay-wrap">
<div class="overlay-title" id="overlayTitle">REST</div>
<div class="overlay-time" id="overlayTime">02:00</div>
<button class="overlay-btn" id="overlayBtn">건너뛰기</button>
</div>
</div>

<div class="overlay hidden" id="resetOverlay" style="z-index:9999999;">
<div class="overlay-wrap">
<div class="overlay-title" style="color:#ff6666;">RESET</div>
<div style="font-size:20px; font-weight:900; text-align:center; line-height:1.5;">모든 기록을 초기화할까요?</div>
<button class="main-btn" id="confirmResetBtn" style="background:#ff6666; color:white; height:60px;">초기화</button>
<button class="overlay-btn" id="cancelResetBtn">취소</button>
</div>
</div>

<script>
const weights=[25,36,47,58,69,80];
const lbs=[55,79,104,128,152,176];
const CONFIG = {SUCCESS_REP: 8,REST_SEC: 120,NEGATIVE_SEC: 5,HOLD_SEC: 20};
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
    
let userData = JSON.parse(localStorage.getItem('gdiron_v501')) || {
 mainIndexLeft: 1,
 mainIndexRight: 1,
 bestHoldLeft: 0,
 bestHoldRight: 0,
 history: []
};

// 마이그레이션 호환 처리
if(userData.mainIndex && !userData.mainIndexLeft) {
    userData.mainIndexLeft = userData.mainIndex;
    userData.mainIndexRight = userData.mainIndex;
    delete userData.mainIndex;
}

let currentSettingHand = 'LEFT'; 

function saveData(){
    localStorage.setItem('gdiron_v501', JSON.stringify(userData));
}

// 홈 UI 갱신 시 연속 스트릭 데이터를 실시간으로 읽어와서 그리는 핵심 알고리즘 포함
function updateHomeUI(){
    const leftKg = weights[userData.mainIndexLeft-1];
    const rightKg = weights[userData.mainIndexRight-1];
    document.getElementById('homeWeight').textContent = `L: ${leftKg}kg / R: ${rightKg}kg`;

    // 1. 역사적 연속 기록(Streak) 연산 분기 부
    let leftCountSuccess = 0; let leftCountFail = 0;
    let rightCountSuccess = 0; let rightCountFail = 0;

    // 왼손 연속 판단
    if(userData.history.length > 0) {
        const firstLeftSuccess = userData.history[0].mainResults.every(r => r.left >= CONFIG.SUCCESS_REP);
        if(firstLeftSuccess) {
            for(let i=0; i<userData.history.length; i++){
                if(userData.history[i].mainResults.every(r => r.left >= CONFIG.SUCCESS_REP)) leftCountSuccess++;
                else break;
            }
        } else {
            for(let i=0; i<userData.history.length; i++){
                if(!userData.history[i].mainResults.every(r => r.left >= CONFIG.SUCCESS_REP)) leftCountFail++;
                else break;
            }
        }
    }

    // 오른손 연속 판단
    if(userData.history.length > 0) {
        const firstRightSuccess = userData.history[0].mainResults.every(r => r.right >= CONFIG.SUCCESS_REP);
        if(firstRightSuccess) {
            for(let i=0; i<userData.history.length; i++){
                if(userData.history[i].mainResults.every(r => r.right >= CONFIG.SUCCESS_REP)) rightCountSuccess++;
                else break;
            }
        } else {
            for(let i=0; i<userData.history.length; i++){
                if(!userData.history[i].mainResults.every(r => r.right >= CONFIG.SUCCESS_REP)) rightCountFail++;
                else break;
            }
        }
    }

    // 2. 왼손 도트 인디케이터 바인딩 및 가이드라인 문구 출력
    const leftDots = document.getElementById('leftDots').querySelectorAll('.dot');
    leftDots.forEach(d => d.className = 'dot'); // 초기화
    const leftMsg = document.getElementById('leftStreakMsg');

    if(leftCountSuccess > 0) {
        // 최대 2칸 채우기
        for(let i=0; i<Math.min(2, leftCountSuccess); i++) { leftDots[i].classList.add('success-active'); }
        leftMsg.textContent = `🔥 연속 ${leftCountSuccess}회 성공 중! (1회 더 성공 시 무게 증량)`;
        leftMsg.style.color = 'var(--green)';
    } else if(leftCountFail > 0) {
        for(let i=0; i<Math.min(2, leftCountFail); i++) { leftDots[i].classList.add('fail-active'); }
        leftMsg.textContent = `⚠️ 연속 ${leftCountFail}회 실패 상태 (3회 연속 실패 시 무게 감량)`;
        leftMsg.style.color = 'var(--red)';
    } else {
        leftMsg.textContent = `⚡ 신규 기록 대기 중 (8회 달성 시 스택 누적)`;
        leftMsg.style.color = 'var(--sub)';
    }

    // 3. 오른손 도트 인디케이터 바인딩 및 가이드라인 문구 출력 (감량 기준이 3칸이므로 도트 개수 대응)
    const rightDots = document.getElementById('rightDots').querySelectorAll('.dot');
    rightDots.forEach(d => d.className = 'dot');
    const rightMsg = document.getElementById('rightStreakMsg');

    if(rightCountSuccess > 0) {
        for(let i=0; i<Math.min(2, rightCountSuccess); i++) { rightDots[i].classList.add('success-active'); }
        rightMsg.textContent = `🔥 연속 ${rightCountSuccess}회 성공 중! (1회 더 성공 시 무게 증량)`;
        rightMsg.style.color = 'var(--green)';
    } else if(rightCountFail > 0) {
        for(let i=0; i<Math.min(3, rightCountFail); i++) { rightDots[i].classList.add('fail-active'); }
        rightMsg.textContent = `⚠️ 연속 ${rightCountFail}회 실패 상태 (${3 - Math.min(3, rightCountFail)}회 더 실패 시 무게 감량)`;
        rightMsg.style.color = 'var(--red)';
    } else {
        rightMsg.textContent = `⚡ 신규 기록 대기 중 (8회 달성 시 스택 누적)`;
        rightMsg.style.color = 'var(--sub)';
    }

    // 최근 메인 세트 결과 렌더링 로직
    if(userData.history.length){
        const recent = userData.history[0];
        document.getElementById('homeRecentWeight').textContent = recent.mainWeight || `L:${leftKg}k/R:${rightKg}k`;
        
        const detailHtml = recent.mainResults.map(r => {
            const rightText = r.right !== null ? `R${r.right}` : 'R -';
            return `<div class="home-rep-line">
                        <span class="home-rep-label">${r.set}세트</span>
                        <span class="home-rep-value">L${r.left} / ${rightText}</span>
                    </div>`;
        }).join('');
        document.getElementById('homeRecentDetail').innerHTML = detailHtml;
    }else{
        document.getElementById('homeRecentWeight').textContent = '0kg';
        document.getElementById('homeRecentDetail').textContent = '훈련 데이터가 없습니다.';
    }
}

let flow=[];
let flowIndex=0;
let currentHand='LEFT';
let selectedRep=8;
let mainResults=[];
let negativeResults=[];
let holdResults=[];

    const UI = {
    overlay: document.getElementById('overlay'),
    overlayTitle: UI.overlayTitle,
    overlayTime: UI.overlayTime,
    overlayBtn: UI.overlayBtn,
    actionBtn: document.getElementById('actionBtn')
};
    
function buildFlow(){
    flow = [];
    flow.push({ type:'warmup', title:'웜업 1', target:15 });
    flow.push({ type:'warmup', title:'웜업 2', target:8 });

    for(let i=1;i<=3;i++){
        flow.push({ type:'main', title:`메인 ${i}세트`, set:i, target:8 });
    }
    for(let i=1;i<=2;i++){
        flow.push({ type:'negative', title:`네거티브 ${i}회차`, set:i, target:5 });
    }
    for(let i=1;i<=2;i++){
        flow.push({ type:'hold', title:`최대 홀딩 ${i}회차`, set:i, target:20 });
    }
}

function openPage(page){
    document.querySelectorAll('.page,.session').forEach(p=>{
        p.classList.add('hidden');
    });
    const tabsMenu = document.querySelector('.tabs');

    if(page==='home'){
        homePage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }
    if(page==='session'){
        sessionPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }
    if(page==='history'){
        historyPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
    }
    if(page==='setting'){
        settingPage.classList.remove('hidden');
        if(tabsMenu) tabsMenu.classList.remove('hidden');
        updateSettingButtons();
    }
}

function getPrevRecord(type,setNum){
    if(!userData.history.length) return '없음';
    const last = userData.history[0];

    if(type==='main'){
        const item = last.mainResults.find(r=>r.set===setNum);
        if(!item) return '없음';
        return `${last.mainWeight} | L${item.left} / R${item.right}`;
    }

    if(type==='negative'){
        const left = last.negativeResults.filter(n => n.hand === 'LEFT')[setNum - 1];
        const right = last.negativeResults.filter(n => n.hand === 'RIGHT')[setNum - 1];
        return `${last.negativeWeight} | L${left?.value || 0}s / R${right?.value || 0}s`;
    }

    if(type==='hold'){
        const item = last.holdResults?.find(h => h.set === setNum);
        const left = item?.left || '0';
        const right = item?.right || '0';
        return `${last.holdWeight} | L${left}s / R${right}s`;
    }

    return '없음';
}

function renderStep(){
    const item=flow[flowIndex];
    const top= document.getElementById('sessionTop');
    top.classList.remove('left-mode', 'right-mode');
    top.classList.add(currentHand==='LEFT' ? 'left-mode' : 'right-mode');

    const badge= document.getElementById('phaseBadge');
    badge.className='phase-badge';

    if(item.type==='warmup'){ badge.classList.add('phase-warm'); badge.textContent='WARMUP'; }
    if(item.type==='main'){ badge.classList.add('phase-main'); badge.textContent='MAIN'; }
    if(item.type==='negative'){ badge.classList.add('phase-negative'); badge.textContent='NEGATIVE'; }
    if(item.type==='hold'){ badge.classList.add('phase-hold'); badge.textContent='HOLD'; }

    document.getElementById('handText').textContent=currentHand;
    document.getElementById('exerciseText').textContent=item.title;

    const currentIdx = currentHand === 'LEFT' ? userData.mainIndexLeft : userData.mainIndexRight;
    let stepWeight = weights[currentIdx - 1];
    if (item.type === 'warmup') {
        const offset = item.title === '웜업 1' ? 3 : 2;
        stepWeight = weights[Math.max(0, currentIdx - offset)];
    } else if (item.type === 'negative') {
        stepWeight = weights[Math.min(5, currentIdx)];
    }
    item.weight = stepWeight;

    const weightIdx = weights.indexOf(stepWeight);
    const displayLb = weightIdx !== -1 ? lbs[weightIdx] : '';
    document.getElementById('weightText').textContent = displayLb ? `${stepWeight}kg (${displayLb}lb)` : `${stepWeight}kg`;

    document.getElementById('targetText').textContent = 
        item.type==='negative' ? '5초 유지' : item.type==='hold' ? `${item.target || 20}초 유지` : `${item.target || 8}회 수행`;

    document.getElementById('progressText').textContent=`${flowIndex+1}/${flow.length}`;
    document.getElementById('progressFill').style.width=`${((flowIndex+1)/flow.length)*100}%`;
    document.getElementById('prevRecord').textContent=getPrevRecord(item.type, item.set);

    document.getElementById('repSection').style.display = item.type==='main' ? 'block' : 'none';

    const actionBtn = document.getElementById('actionBtn');
    if (item.type === 'negative' || item.type === 'hold') {
        actionBtn.textContent = '시작';
    } else {
        actionBtn.textContent = '완료';
    }

    const prevBtn = document.getElementById('prevStepBtn');
    if (flowIndex === 0 && currentHand === 'LEFT') {
        prevBtn.disabled = true;
    } else {
        prevBtn.disabled = false;
    }
}

document.querySelectorAll('.rep-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.rep-btn').forEach(b=>{ b.classList.remove('active'); });
        btn.classList.add('active');
        selectedRep= Number(btn.textContent);
    };
});

document.getElementById('startBtn').onclick=()=>{
    buildFlow();
    flowIndex=0;
    currentHand='LEFT';
    mainResults=[];
    negativeResults=[];
    holdResults = [];
    openPage('session');
    renderStep();
};

let timer;

function playBeep(frequency, duration) {
    try {
        if (!audioCtx) {
            audioCtx = new AudioCtx();
        }

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration / 1000);

    } catch (e) {
        console.log("AudioContext error");
    }
}

function triggerRestEndNotification() {
    if (navigator.vibrate) { navigator.vibrate(500); }
    playBeep(440, 400);
}

function triggerNegativeEndNotification() {
    if (navigator.vibrate) { navigator.vibrate(600); }
    playBeep(587.33, 450);
}

function startRest(){
    UI.overlay.classList.remove('hidden');
    UI.overlayTitle.textContent='REST';
    UI.overlayBtn.textContent='건너뛰기';

    let sec = CONFIG.REST_SEC;
    updateRest(sec);
    clearInterval(timer);

    timer=setInterval(()=>{
        sec--;
        updateRest(sec);

        if(sec === 3 || sec === 2 || sec === 1){
            playBeep(880, 80);
        }

        if(sec<=0){
            clearInterval(timer);
            UI.overlay.classList.add('hidden');
            triggerRestEndNotification();
            nextStep();
        }
    },1000);

    UI.overlayBtn.onclick=(e)=>{
        e.stopPropagation();
        clearInterval(timer);
        UI.overlay.classList.add('hidden');
        nextStep();
    };
}

function updateRest(sec){
    const m= String(Math.floor(sec/60)).padStart(2,'0');
    const s= String(sec%60).padStart(2,'0');
    UI.overlayTime.textContent=`${m}:${s}`;
}

// 수정사항 반영: 준비 시간 카운트는 소수점을 없애고 확실하게 3 -> 2 -> 1 정수로 노출
function startNegative(){
    UI.overlay.classList.remove('hidden');
    UI.overlayTitle.textContent='READY';
    UI.overlayBtn.textContent='건너뛰기';
    
    let readySec = 3;
    UI.overlayTime.textContent = readySec;
    playBeep(600, 100);

    clearInterval(timer);
    timer = setInterval(() => {
        readySec--;
        if (readySec <= 0) {
            clearInterval(timer);
            runActualNegative();
        } else {
            UI.overlayTime.textContent = readySec;
            playBeep(600, 100);
        }
    }, 1000);

    UI.overlayBtn.onclick=(e)=>{
        e.stopPropagation();
        clearInterval(timer);
        runActualNegative();
    };
}

function runActualNegative() {
    UI.overlayTitle.textContent='NEGATIVE';
    UI.overlayBtn.textContent='종료';
    const start=Date.now();

    clearInterval(timer);
    timer=setInterval(()=>{
    const sec = CONFIG.NEGATIVE_SEC - ((Date.now()-start)/1000);
        UI.overlayTime.textContent= Math.max(0,sec).toFixed(1);
        if(sec<=0){
            clearInterval(timer);
            triggerNegativeEndNotification();
            finishNegative(CONFIG.NEGATIVE_SEC);
        }
    },100);

    UI.overlayBtn.onclick=(e)=>{
        e.stopPropagation();
        clearInterval(timer);
        const sec= ((Date.now()-start)/1000);
        finishNegative(sec);
    };
}

function finishNegative(sec){
    negativeResults.push({ hand:currentHand, value:sec.toFixed(1) });
    UI.overlay.classList.add('hidden');
    if(currentHand==='LEFT'){
        currentHand='RIGHT';
        renderStep();
        return;
    }
    startRest();
}

// 수정사항 반영: 홀딩 타이머 진입 전 준비시간도 확실히 3 -> 2 -> 1 정수 노출
function startHold(){
    UI.overlay.classList.remove('hidden');
    UI.overlayTitle.textContent='READY';
    UI.overlayBtn.textContent='건너뛰기';
    
    let readySec = 3;
    UI.overlayTime.textContent = readySec;
    playBeep(600, 100);

    clearInterval(timer);
    timer = setInterval(() => {
        readySec--;
        if (readySec <= 0) {
            clearInterval(timer);
            runActualHold();
        } else {
            UI.overlayTime.textContent = readySec;
            playBeep(600, 100);
        }
    }, 1000);

    UI.overlayBtn.onclick=(e)=>{
        e.stopPropagation();
        clearInterval(timer);
        runActualHold();
    };
}

function runActualHold() {
    UI.overlayTitle.textContent='HOLD';
    UI.overlayBtn.textContent='종료';
    const start=Date.now();
    const targetDuration = CONFIG.HOLD_SEC;

    clearInterval(timer);
    timer=setInterval(()=>{
        const sec = targetDuration - ((Date.now()-start)/1000);
        UI.overlayTime.textContent = Math.max(0, sec).toFixed(1);
        if(sec <= 0){
            clearInterval(timer);
            triggerNegativeEndNotification(); 
            finishHold(targetDuration);
        }
    }, 100);

    UI.overlayBtn.onclick=(e)=>{
        e.stopPropagation();
        clearInterval(timer);
        const rawSec = ((Date.now()-start)/1000);
        const finalSec = Math.min(targetDuration, rawSec);
        finishHold(finalSec);
    };
}

function finishHold(sec){
    UI.overlay.classList.add('hidden');

    if(currentHand==='LEFT'){
        holdResults.push({
            set: flow[flowIndex].set,
            left: sec.toFixed(1),
            right: null
        });

        currentHand='RIGHT';
        renderStep();
        return;
    }

    holdResults[holdResults.length - 1].right = sec.toFixed(1);

    if (flowIndex < flow.length - 1) {
        startRest();
    } else {
        finishSession();
    }
}

function nextStep(){
    flowIndex++;
    currentHand='LEFT';
    if(flowIndex>=flow.length){
        finishSession();
        return;
    }
    renderStep();
}

document.getElementById('actionBtn').onclick=()=>{
    const item=flow[flowIndex];
    if(item.type==='negative'){ startNegative(); return; }
    if(item.type==='hold'){ startHold(); return; }

    if(item.type==='main'){
        if(currentHand==='LEFT'){
            mainResults.push({ set:item.set, left:selectedRep, right:null });
            currentHand='RIGHT';
            renderStep();
            return;
        }
        mainResults[mainResults.length-1].right=selectedRep;
        startRest();
        return;
    }

    if(currentHand==='LEFT'){
        currentHand='RIGHT';
        renderStep();
        return;
    }
    startRest();
};

document.getElementById('prevStepBtn').onclick = () => {
    if (flowIndex === 0 && currentHand === 'LEFT') return;
    const currentItem = flow[flowIndex];

    if (currentHand === 'RIGHT') {
        currentHand = 'LEFT';
        if (currentItem.type === 'main') { mainResults.pop(); } 
        else if (currentItem.type === 'negative') { negativeResults.pop(); }
    } else {
        flowIndex--;
        currentHand = 'RIGHT';
        const prevItem = flow[flowIndex];
        if (prevItem.type === 'main' && mainResults.length > 0) {
            const lastMain = mainResults[mainResults.length - 1];
            selectedRep = lastMain.left; 
            lastMain.right = null;
            document.querySelectorAll('.rep-btn').forEach(b => {
                b.classList.remove('active');
                if(Number(b.textContent) === selectedRep) b.classList.add('active');
            });
        } else if (prevItem.type === 'negative') {
            negativeResults.pop();
        }
    }
    renderStep();
};

document.getElementById('overlay').onclick = function() {
    const btnElement = UI.overlayBtn;
    if (btnElement) { btnElement.click(); }
};
document.querySelector('.overlay-wrap').onclick = function(e) { e.stopPropagation(); };

// 핵심 비즈니스 로직: 2회 연속 성공 시 증량 / 3회 연속 실패 시 감량 완전 분리 정산
function finishSession(){
    const leftSuccess = mainResults.every(r => r.left >= CONFIG.SUCCESS_REP);
    const rightSuccess = mainResults.every(r => r.right >= CONFIG.SUCCESS_REP);

    const sessionLeftWeight = weights[userData.mainIndexLeft - 1];
    const sessionRightWeight = weights[userData.mainIndexRight - 1];

    let leftSuccessStreak = leftSuccess ? 1 : 0;
    let leftFailStreak = !leftSuccess ? 1 : 0;
    let rightSuccessStreak = rightSuccess ? 1 : 0;
    let rightFailStreak = !rightSuccess ? 1 : 0;

    for (let i = 0; i < userData.history.length; i++) {
        const hist = userData.history[i];
        if (!hist.mainResults || hist.mainResults.length === 0) break;

        const histLeftSuccess = hist.mainResults.every(r => r.left >= CONFIG.SUCCESS_REP);
        if (leftSuccess && histLeftSuccess) leftSuccessStreak++;
        else if (!leftSuccess && !histLeftSuccess) leftFailStreak++;
        else break;
    }

    for (let i = 0; i < userData.history.length; i++) {
        const hist = userData.history[i];
        if (!hist.mainResults || hist.mainResults.length === 0) break;

        const histRightSuccess = hist.mainResults.every(r => r.right >= CONFIG.SUCCESS_REP);
        if (rightSuccess && histRightSuccess) rightSuccessStreak++;
        else if (!rightSuccess && !histRightSuccess) rightFailStreak++;
        else break;
    }

    if (leftSuccessStreak >= 2 && userData.mainIndexLeft < 6) userData.mainIndexLeft++;
    else if (leftFailStreak >= 3 && userData.mainIndexLeft > 1) userData.mainIndexLeft--;

    if (rightSuccessStreak >= 2 && userData.mainIndexRight < 6) userData.mainIndexRight++;
    else if (rightFailStreak >= 3 && userData.mainIndexRight > 1) userData.mainIndexRight--;

    userData.history.unshift({
        date: new Date().toLocaleDateString(),
        mainWeight: `L:${sessionLeftWeight}k / R:${sessionRightWeight}k`,
        negativeWeight: `L:${weights[Math.min(5, userData.mainIndexLeft)]}k / R:${weights[Math.min(5, userData.mainIndexRight)]}k`,
        holdWeight: `L:${sessionLeftWeight}k / R:${sessionRightWeight}k`,
        mainResults,
        negativeResults,
        holdResults
    });

    saveData();
    updateHomeUI();
    renderResult();
}

function renderResult(){
    document.getElementById('resultPage').classList.remove('hidden');
    const history= userData.history[0];

    document.getElementById('resultMain').innerHTML= `
        <div class="result-label" style="color:var(--main);">메인 운동</div>
        <div class="result-weight">${history.mainWeight}</div>
        ${history.mainResults.map(r=>`<div class="result-line" style="color:var(--main);">${r.set}세트 L${r.left} / R${r.right}</div>`).join('')}
    `;

    document.getElementById('resultNegative').innerHTML= `
        <div class="result-label" style="color:var(--negative);">네거티브</div>
        <div class="result-weight">${history.negativeWeight}</div>
        ${history.negativeResults.map(n=>`<div class="result-line" style="color:var(--negative);">${n.hand} ${n.value}초</div>`).join('')}
    `;

    document.getElementById('resultHold').innerHTML= `
        <div class="result-label" style="color:var(--hold);">홀딩</div>
        <div class="result-weight">${history.holdWeight}</div>
        ${(history.holdResults || []).map(h => `<div class="result-line" style="color:var(--hold);">${h.set}회차 L${h.left}초 / R${h.right}초</div>`).join('')}
    `;
    loadHistory();
}

document.getElementById('resultCloseBtn').onclick=()=>{
    document.getElementById('resultPage').classList.add('hidden');
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        if(t.dataset.page === 'home') t.classList.add('active');
    });
    openPage('home');
};

function loadHistory(){
    const page= document.getElementById('historyPage');
    page.innerHTML='';

    userData.history.forEach(item=>{
        const div= document.createElement('div');
        div.className='history-card';
        div.innerHTML=`
            <div class="history-title">${item.date}</div>
            <div class="history-block history-main">
                <div class="history-label" style="color:var(--main);">MAIN ${item.mainWeight}</div>
                ${item.mainResults.map(r=>`<div class="history-line ${ (r.left<8 || r.right<8) ? 'fail' : ''}">${r.set}세트 L${r.left} / R${r.right}</div>`).join('')}
            </div>
            <div class="history-block history-negative">
                <div class="history-label" style="color:var(--negative);">NEGATIVE ${item.negativeWeight}</div>
                ${item.negativeResults.map(n=>`<div class="history-line">${n.hand} ${n.value}초</div>`).join('')}
            </div>
            <div class="history-block history-hold">
                <div class="history-label" style="color:var(--hold);">HOLD ${item.holdWeight}</div>
                ${(item.holdResults || []).map(h=>`<div class="history-line">${h.set}회차 L${h.left}s / R${h.right}s</div>`).join('')}
            </div>
        `;
        page.appendChild(div);
    });
}

function updateSettingButtons() {
    document.getElementById('settingWeightLabel').textContent = currentSettingHand === 'LEFT' ? '왼손 무게 설정' : '오른손 무게 설정';
    const targetIdx = currentSettingHand === 'LEFT' ? userData.mainIndexLeft : userData.mainIndexRight;
    
    document.querySelectorAll('.setting-btn').forEach((btn, index) => {
        btn.classList.remove('active');
        if(targetIdx === index + 1) {
            btn.classList.add('active');
        }
    });
}

document.getElementById('toggleLeftBtn').onclick = () => {
    currentSettingHand = 'LEFT';
    document.getElementById('toggleRightBtn').classList.remove('active');
    document.getElementById('toggleLeftBtn').classList.add('active');
    updateSettingButtons();
};

document.getElementById('toggleRightBtn').onclick = () => {
    currentSettingHand = 'RIGHT';
    document.getElementById('toggleLeftBtn').classList.remove('active');
    document.getElementById('toggleRightBtn').classList.add('active');
    updateSettingButtons();
};

document.querySelectorAll('.setting-btn').forEach((btn,index)=>{
    btn.onclick=()=>{
        if(currentSettingHand === 'LEFT') {
            userData.mainIndexLeft = index + 1;
        } else {
            userData.mainIndexRight = index + 1;
        }
        saveData();
        updateSettingButtons();
        updateHomeUI();
    };
});

document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=()=>{
        document.querySelectorAll('.tab').forEach(t=>{ t.classList.remove('active'); });
        tab.classList.add('active');
        openPage(tab.dataset.page);
    };
});

document.getElementById('resetBtn').onclick=()=>{
    document.getElementById('resetOverlay').classList.remove('hidden');
};

document.getElementById('cancelResetBtn').onclick=()=>{
    document.getElementById('resetOverlay').classList.add('hidden');
};

document.getElementById('confirmResetBtn').onclick=()=>{
    localStorage.removeItem('gdiron_v501');
    userData={ mainIndexLeft:1, mainIndexRight:1, bestHoldLeft:0, bestHoldRight:0, history:[] };
    saveData();
    updateHomeUI();
    loadHistory();
    document.getElementById('resetOverlay').classList.add('hidden');
    openPage('home');
};

// 최초 구동 실행 트리거
updateHomeUI();
loadHistory();
</script>
