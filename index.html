<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD 80 악력 훈련 매니저 PRO</title>
    <style>
        :root { 
            --bg-color: #f4f6f9; 
            --card-bg: #ffffff; 
            --text-color: #333333; 
            --primary-color: #4f46e5; 
            --success-color: #10b981; 
            --warning-color: #f59e0b; 
            --danger-color: #ef4444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        /* 상단 고정 타이머 바 */
        .sticky-timer-box { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            background: #1e293b; color: #ffffff; padding: 12px 16px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .timer-flash { background-color: var(--success-color) !important; }
        .timer-info { display: flex; flex-direction: column; }
        .timer-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: bold; }
        .timer-display { font-size: 28px; font-weight: bold; margin: 2px 0; font-variant-numeric: tabular-nums; }
        .alert-modes { display: flex; gap: 6px; margin-top: 2px; }
        .alert-modes label { font-size: 11px; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 2px; }
        .timer-reset-btn { background: rgba(255,255,255,0.15); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        /* 메인 컨테이너 및 슬라이드 카드 */
        .container { max-width: 500px; width: 100%; padding: 20px; box-sizing: border-box; margin-top: 90px; margin-bottom: 20px; }
        .workout-card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; }
        .workout-card.active { display: block; }
        
        h2 { font-size: 20px; margin-top: 0; color: #1e1b4b; display: flex; justify-content: space-between; align-items: center; }
        .step-badge { font-size: 12px; background: var(--primary-color); color: white; padding: 4px 8px; border-radius: 20px; }
        .section-desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; }
        
        /* 세트별 입력 행 (오터치 방지 거대 버튼) */
        .set-row { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .set-label { font-size: 14px; font-weight: bold; color: #475569; }
        .inputs-warp { display: flex; gap: 8px; }
        .input-group { display: flex; align-items: center; gap: 4px; }
        .num-input { width: 55px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 6px; text-align: center; font-size: 15px; font-weight: bold; color: #1e293b; }
        .input-group label { font-size: 12px; color: #64748b; font-weight: bold; }
        
        /* 거대 체크 버튼 */
        .set-check-btn { padding: 10px 16px; background: #fff; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .set-check-btn.done { background: var(--success-color); color: white; border-color: var(--success-color); }
        
        /* 카드 네비게이션 버튼 */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .nav-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: #475569; }
        .nav-btn.next { background: var(--primary-color); color: white; }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 대시보드 & 달력 & 메모 */
        .pr-dashboard { background: linear-gradient(135deg, #eef2ff, #e0e7ff); border: 1px solid #c7d2fe; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 12px; text-align: center; }
        .pr-item { flex: 1; } .pr-label { color: #64748b; font-size: 10px; } .pr-value { font-weight: bold; color: #1e1b4b; margin-top: 2px; }
        
        .calendar-container { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 10px; }
        .calendar-day-label { font-size: 11px; font-weight: bold; color: #94a3b8; }
        .calendar-day { font-size: 12px; padding: 8px 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; font-weight: bold; position: relative; cursor: pointer; }
        .calendar-day.today { border-color: var(--primary-color); color: var(--primary-color); }
        .calendar-day.completed::after { content: "🔥"; position: absolute; font-size: 9px; bottom: -2px; right: 2px; }
        .calendar-day.selected { border-color: var(--primary-color)!important; background: var(--primary-color)!important; color: white!important; }

        .history-panel { display: none; margin-top: 12px; background: #fff; border: 2px dashed #cbd5e1; padding: 12px; border-radius: 8px; font-size: 12px; }
        .history-row { margin-bottom: 4px; padding-left: 4px; }

        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; resize: none; box-sizing: border-box; font-size: 14px; margin-top: 15px; }
        .save-btn { width: 100%; padding: 14px; background: var(--success-color); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sticky-timer-box" id="timer-box">
        <div class="timer-info">
            <div class="timer-label" id="timer-status">휴식 타이머 대기 중</div>
            <div class="timer-display" id="timer-text">02:00</div>
            <div class="alert-modes">
                <label><input type="radio" name="alertMode" value="sound" checked> 🔊 소리</label>
                <label><input type="radio" name="alertMode" value="vibrate"> 📳 진동</label>
                <label><input type="radio" name="alertMode" value="silent"> 🔇 무음</label>
            </div>
        </div>
        <button class="timer-reset-btn" onclick="resetTimerOnly()">리셋</button>
    </div>

    <div class="container">
        <div class="pr-dashboard">
            <div class="pr-item"><div class="pr-label">웜업 최고</div><div class="pr-value" id="pr-warmup">-</div></div>
            <div class="pr-item"><div class="pr-label">메인 최고</div><div class="pr-value" id="pr-main">-</div></div>
            <div class="pr-item"><div class="pr-label">네거티브 최고</div><div class="pr-value" id="pr-negative">-</div></div>
            <div class="pr-item"><div class="pr-label">홀딩 최고</div><div class="pr-value" id="pr-holding">-</div></div>
        </div>

        <div class="workout-card active" id="card-0">
            <h2>1. 워밍업 <span class="step-badge">1 / 4 단계</span></h2>
            <div class="section-desc">10회 가볍게 쥐며 전완근에 열 올리기</div>
            <div class="set-row">
                <span class="set-label">웜업 1</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-w1" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-w1" class="num-input" value="10"><label>회</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
        </div>

        <div class="workout-card" id="card-1">
            <h2>2. 메인 세트 <span class="step-badge">2 / 4 단계</span></h2>
            <div class="section-desc">최대 5~8회 겨우 가능한 장력으로 완전히 클로징</div>
            <div class="set-row">
                <span class="set-label">1 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-m1" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-m1" class="num-input"><label>회</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
            <div class="set-row">
                <span class="set-label">2 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-m2" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-m2" class="num-input"><label>회</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
            <div class="set-row">
                <span class="set-label">3 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-m3" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-m3" class="num-input"><label>회</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
        </div>

        <div class="workout-card" id="card-2">
            <h2>3. 네거티브 <span class="step-badge">3 / 4 단계</span></h2>
            <div class="section-desc">양손으로 닫은 후, 한 손으로 5초간 버티며 펴기</div>
            <div class="set-row">
                <span class="set-label">1 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-n1" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-n1" class="num-input" value="5"><label>초</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
            <div class="set-row">
                <span class="set-label">2 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-n2" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-n2" class="num-input" value="5"><label>초</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
        </div>

        <div class="workout-card" id="card-3">
            <h2>4. 홀딩 <span class="step-badge">4 / 4 단계</span></h2>
            <div class="section-desc">완전히 꽉 쥔 상태로 7~10초간 최대 수축 유지</div>
            <div class="set-row">
                <span class="set-label">1 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-h1" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-h1" class="num-input" value="7"><label>초</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>
            <div class="set-row">
                <span class="set-label">2 세트</span>
                <div class="inputs-warp">
                    <div class="input-group"><input type="number" inputmode="decimal" id="w-h2" class="num-input" placeholder="kg"><label>kg</label></div>
                    <div class="input-group"><input type="number" inputmode="numeric" id="r-h2" class="num-input" value="7"><label>초</label></div>
                </div>
                <button class="set-check-btn" onclick="toggleSetRow(this)">완료</button>
            </div>

            <textarea id="memo" placeholder="오늘 컨디션 및 피드백 노트..."></textarea>
            <button class="save-btn" onclick="saveAllWorkoutData()">🔥 오늘 훈련 종료 및 기록 저장</button>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prev-btn" onclick="moveCard(-1)" disabled>이전 운동</button>
            <button class="nav-btn next" id="next-btn" onclick="moveCard(1)">다음 운동</button>
        </div>

        <div class="calendar-container">
            <div style="font-size:13px; font-weight:bold; color:#334155; display:flex; justify-content:space-between;">
                <span id="calendar-month-year"></span>
                <span style="font-size:11px; color:var(--primary-color);">📅 날짜 클릭 시 이전내역 복원</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            
            <div class="history-panel" id="history-panel">
                <div id="history-date-title" style="font-weight:bold; color:var(--primary-color); margin-bottom:8px;"></div>
                <div id="history-content"></div>
            </div>
        </div>
    </div>

    <script>
        let currentCard = 0;
        const totalCards = 4;
        let timer;
        let timeLeft = 120;
        let completedDates = [];
        let dailyLogs = {};
        let prRecords = { warmup: 0, main: 0, negative: 0, holding: 0 };
        
        const inputIds = ['w-w1','r-w1','w-m1','r-m1','w-m2','r-m2','w-m3','r-m3','w-n1','r-n1','w-n2','r-n2','w-h1','r-h1','w-h2','r-h2'];

        function moveCard(step) {
            document.getElementById(`card-${currentCard}`).classList.remove('active');
            currentCard += step;
            document.getElementById(`card-${currentCard}`).classList.add('active');
            
            document.getElementById('prev-btn').disabled = (currentCard === 0);
            const nextBtn = document.getElementById('next-btn');
            if (currentCard === totalCards - 1) {
                nextBtn.innerText = "훈련 완료 단계";
                nextBtn.disabled = true;
            } else {
                nextBtn.innerText = "다음 운동";
                nextBtn.disabled = false;
            }
        }

        function playSound(freq, duration = 0.15) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                oscillator.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function toggleSetRow(btn) {
            btn.classList.toggle('done');
            if (btn.classList.contains('done')) {
                btn.innerText = "완료됨";
                startRestTimer();
                saveTempInputs();
            } else {
                btn.innerText = "완료";
            }
        }

        function startRestTimer() {
            clearInterval(timer);
            timeLeft = 120;
            document.getElementById('timer-status').innerText = "🔥 세트 간 휴식 중...";
            document.getElementById('timer-status').style.color = "#f59e0b";
            
            timer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
                document.getElementById('timer-text').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                if(timeLeft <= 3 && timeLeft > 0 && document.querySelector('input[name="alertMode"]:checked').value === 'sound') {
                    playSound(440, 0.08);
                }
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-status').innerText = "💪 휴식 끝! 다음 세트 도전";
                    document.getElementById('timer-status').style.color = "#10b981";
                    if(document.querySelector('input[name="alertMode"]:checked').value === 'sound') playSound(880, 0.4);
                }
            }, 1000);
        }

        function resetTimerOnly() {
            clearInterval(timer); timeLeft = 120;
            document.getElementById('timer-text').innerText = "02:00";
            document.getElementById('timer-status').innerText = "휴식 타이머 대기 중";
            document.getElementById('timer-status').style.color = "#94a3b8";
        }

        function saveTempInputs() {
            let vals = {}; inputIds.forEach(id => { vals[id] = document.getElementById(id).value; });
            localStorage.setItem('grip_temp_vals', JSON.stringify(vals));
            calculatePR(vals);
        }

        function calculatePR(vals) {
            const getMax = (arr) => {
                let max = 0; arr.forEach(id => { const w = parseFloat(vals[id]); if(!isNaN(w) && w > max) max = w; });
                return max;
            };
            prRecords.warmup = Math.max(prRecords.warmup, getMax(['w-w1']));
            prRecords.main = Math.max(prRecords.main, getMax(['w-m1','w-m2','w-m3']));
            prRecords.negative = Math.max(prRecords.negative, getMax(['w-n1','w-n2']));
            prRecords.holding = Math.max(prRecords.holding, getMax(['w-h1','w-h2']));
            localStorage.setItem('grip_pr_records', JSON.stringify(prRecords));
            displayPR();
        }

        function displayPR() {
            document.getElementById('pr-warmup').innerText = prRecords.warmup ? prRecords.warmup+'kg' : '-';
            document.getElementById('pr-main').innerText = prRecords.main ? prRecords.main+'kg' : '-';
            document.getElementById('pr-negative').innerText = prRecords.negative ? prRecords.negative+'kg' : '-';
            document.getElementById('pr-holding').innerText = prRecords.holding ? prRecords.holding+'kg' : '-';
        }

        function saveAllWorkoutData() {
            saveTempInputs();
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            if(!completedDates.includes(dateStr)) {
                completedDates.push(dateStr);
                localStorage.setItem('grip_completed_dates', JSON.stringify(completedDates));
            }
            
            let currentVals = {}; inputIds.forEach(id => { currentVals[id] = document.getElementById(id).value; });
            dailyLogs[dateStr] = { data: currentVals, memo: document.getElementById('memo').value };
            localStorage.setItem('grip_daily_logs', JSON.stringify(dailyLogs));
            
            renderCalendar();
            alert('오늘의 훈련 무게와 횟수가 완벽하게 타임라인에 박제되었습니다! 🔥');
        }

        function showHistory(dateStr) {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
            const panel = document.getElementById('history-panel');
            const content = document.getElementById('history-content');
            document.getElementById('history-date-title').innerText = `🔍 ${dateStr} 이전 훈련 기록 데이터`;
            
            if(dailyLogs[dateStr]) {
                const log = dailyLogs[dateStr].data;
                content.innerHTML = `
                    <div class="history-row"><b>웜업 1세트:</b> ${log['w-w1']||'-'}kg / ${log['r-w1']||'-'}회</div>
                    <div class="history-row"><b>메인 1세트:</b> ${log['w-m1']||'-'}kg / ${log['r-m1']||'-'}회</div>
                    <div class="history-row"><b>메인 2세트:</b> ${log['w-m2']||'-'}kg / ${log['r-m2']||'-'}회</div>
                    <div class="history-row"><b>메인 3세트:</b> ${log['w-m3']||'-'}kg / ${log['r-m3']||'-'}회</div>
                    <div class="history-row"><b>네거티브 1세트:</b> ${log['w-n1']||'-'}kg / ${log['r-n1']||'-'}초</div>
                    <div class="history-row"><b>네거티브 2세트:</b> ${log['w-n2']||'-'}kg / ${log['r-n2']||'-'}초</div>
                    <div class="history-row"><b>홀딩 1세트:</b> ${log['w-h1']||'-'}kg / ${log['r-h1']||'-'}초</div>
                    <div class="history-row"><b>홀딩 2세트:</b> ${log['w-h2']||'-'}kg / ${log['r-h2']||'-'}초</div>
                    <div style="margin-top:6px; background:#fff7ed; padding:6px; border-radius:4px; color:#c2410c;">📝 메모: ${dailyLogs[dateStr].memo || '없음'}</div>
                `;
            } else {
                content.innerHTML = "🚫 해당 날짜에는 기록된 데이터가 없습니다.";
            }
            panel.style.display = "block";
        }

        function renderCalendar() {
            const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
            document.getElementById('calendar-month-year').innerText = `${year}년 ${String(month+1).padStart(2,'0')}월`;
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            
            ['일','월','화','수','목','금','토'].forEach(d => {
                const l = document.createElement('div'); l.className='calendar-day-label'; l.innerText=d; grid.appendChild(l);
            });
            
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) { grid.appendChild(document.createElement('div')); }
            
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div'); cell.className = 'calendar-day'; cell.innerText = day;
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                if(day === now.getDate()) cell.classList.add('today');
                if(completedDates.includes(dateStr)) cell.classList.add('completed');
                
                cell.onclick = function() { showHistory(dateStr); this.classList.add('selected'); };
                grid.appendChild(cell);
            }
        }

        window.onload = function() {
            if(localStorage.getItem('grip_completed_dates')) completedDates = JSON.parse(localStorage.getItem('grip_completed_dates'));
            if(localStorage.getItem('grip_daily_logs')) dailyLogs = JSON.parse(localStorage.getItem('grip_daily_logs'));
            if(localStorage.getItem('grip_pr_records')) prRecords = JSON.parse(localStorage.getItem('grip_pr_records'));
            
            const temp = localStorage.getItem('grip_temp_vals');
            if(temp) {
                const vals = JSON.parse(temp);
                inputIds.forEach(id => { if(vals[id]) document.getElementById(id).value = vals[id]; });
                calculatePR(vals);
            }
            displayPR(); renderCalendar();
        }
    </script>
</body>
</html>
